<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Student Management System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.sidebar{position:fixed;top:0;left:0;bottom:0;z-index:30;background:#0f172a;color:white;display:flex;flex-direction:column;transition:width .2s;overflow:hidden}
.sb-open{width:245px}.sb-closed{width:0}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:none;background:transparent;color:#64748b;font-size:13px;font-weight:500;text-align:left;cursor:pointer;white-space:nowrap;transition:all .15s}
.nav-btn:hover{background:#1e293b;color:white}
.nav-btn.act{background:#2563eb;color:white}
.card{background:white;border-radius:14px;border:1px solid #f1f5f9;overflow:hidden}
.inp{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:10px;font-size:13px;background:white;font-family:inherit}
.inp:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.lbl{font-size:11px;font-weight:500;color:#64748b;display:block;margin-bottom:5px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn-blue{background:#2563eb;color:white}
.btn-green{background:#16a34a;color:white}
.btn-purple{background:#7c3aed;color:white}
.btn-soft-blue{background:#eff6ff;color:#2563eb}
.btn-soft-red{background:#fef2f2;color:#dc2626}
table{width:100%;border-collapse:collapse}
th{font-weight:500;font-size:11px;color:#94a3b8;text-align:left;padding:8px 16px;background:#f8fafc}
td{padding:10px 16px;font-size:12px;border-top:1px solid #f8fafc;color:#334155}
tr:hover td{background:#fafcff}
.badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.prog{width:100%;height:5px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.pbar{height:100%;border-radius:4px}
.ovx{overflow-x:auto}
.mw480{min-width:480px}.mw560{min-width:560px}
.gap16{display:flex;flex-direction:column;gap:16px}
.frow{display:flex;align-items:center;gap:8px}
.fbetween{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.gauto{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.g2f{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scard{background:white;border-radius:12px;padding:16px;border:1px solid #f1f5f9}
.thead{font-size:20px;font-weight:700;color:#1e293b}
.tsub{font-size:12px;color:#94a3b8;margin-top:4px}
.nodata{padding:48px 20px;text-align:center;color:#94a3b8}
.err-t{font-size:11px;color:#dc2626;margin-top:3px;display:none}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:12px}
.modal-box{background:white;border-radius:20px;width:100%;max-width:460px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 25px 60px rgba(0,0,0,.3)}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #f1f5f9;flex-shrink:0}
.modal-b{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.modal-f{display:flex;gap:10px;padding:14px 18px;border-top:1px solid #f1f5f9;flex-shrink:0}
#toast{position:fixed;bottom:16px;right:16px;z-index:999;display:none;align-items:center;gap:8px;padding:12px 16px;border-radius:12px;color:white;font-size:13px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.2)}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.warnbox{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:7px 10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
@media(min-width:1024px){
  .sb-open{position:static!important;width:245px!important}
  .sb-closed{position:static!important;width:0!important}
  .layout{display:flex!important}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="mroot"></div>
<div id="toast"></div>
<script>
// ── HELPERS ──────────────────────────────────────────────────────────
const uid=()=>'x'+Date.now()+Math.random().toString(36).slice(2,5);
const tod=()=>new Date().toISOString().slice(0,10);
const fD=d=>{try{return new Date(d+'T12:00').toLocaleDateString('en-PK',{day:'2-digit',month:'short',year:'numeric'});}catch{return d;}};
const grd=(m,t)=>{const p=m/t*100;return p>=90?'A+':p>=80?'A':p>=65?'B':p>=50?'C':p>=40?'D':'F';};
const gBg=g=>g==='A+'||g==='A'?'#dcfce7':g==='B'?'#dbeafe':g==='C'?'#fef3c7':'#fee2e2';
const gCl=g=>g==='A+'||g==='A'?'#16a34a':g==='B'?'#1d4ed8':g==='C'?'#d97706':'#dc2626';
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const pct=(n,d)=>d?Math.round(n/d*100):0;
const ADMIN={id:'admin_root',name:'Admin',username:'admin',password:'admin@123',role:'admin',phone:'',createdAt:new Date().toISOString()};
const CNAMES=['Prep','Nursery','KG','Grade 1','Grade 2','Grade 3','Grade 4','Grade 5','Other'];
const SECS=['A','B','C','D','E','F'];
const URMO=['جنوری','فروری','مارچ','اپریل','مئی','جون','جولائی','اگست','ستمبر','اکتوبر','نومبر','دسمبر'];

// ── STORAGE ──────────────────────────────────────────────────────────
const K={U:'sms3_u',C:'sms3_c',S:'sms3_s',A:'sms3_a',R:'sms3_r'};
const db={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};

// ── STATE ─────────────────────────────────────────────────────────────
let S={user:null,page:'overview',side:false,users:[],classes:[],students:[],att:[],reports:[],q:'',attDate:tod(),attCls:'',rptMonth:new Date().getMonth()+1,rptYear:new Date().getFullYear(),rptCls:'',clsF:'',modal:{show:false,type:'',data:null}};
const sv={u:()=>db.set(K.U,S.users),c:()=>db.set(K.C,S.classes),s:()=>db.set(K.S,S.students),a:()=>db.set(K.A,S.att),r:()=>db.set(K.R,S.reports)};

// ── TOAST ─────────────────────────────────────────────────────────────
let _tt;
function toast(msg,type){const el=document.getElementById('toast');el.textContent=(type==='e'?'✗ ':'✓ ')+msg;el.style.display='flex';el.style.background=type==='e'?'#ef4444':'#10b981';clearTimeout(_tt);_tt=setTimeout(()=>el.style.display='none',3200);}

// ── MODAL ─────────────────────────────────────────────────────────────
function openModal(type,dataJson){S.modal={show:true,type,data:dataJson?JSON.parse(dataJson):null};renderModal();}
function closeModal(){S.modal={show:false,type:'',data:null};renderModal();}
function renderModal(){document.getElementById('mroot').innerHTML=S.modal.show?modalHTML():'';}

function modalHTML(){
  const{type,data:d}=S.modal;
  const titles={class:d?'Class Edit':'Nayi Class',teacher:d?'Teacher Edit':'Naya Teacher',mufattish:d?'Mufattish Edit':'Naya Mufattish',student:d?'Student Edit':'Naya Student'};
  const fns={class:'saveClass()',teacher:'saveUser()',mufattish:'saveUser()',student:'saveStudent()'};
  const bodies={class:classModalBody(),teacher:userModalBody(),mufattish:userModalBody(),student:stuModalBody()};
  return `<div class="modal-ov" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-h"><h3 style="font-size:15px;font-weight:600">${esc(titles[type]||'')}</h3>
        <button onclick="closeModal()" style="background:none;border:none;font-size:18px;color:#94a3b8;cursor:pointer">✕</button></div>
      <div class="modal-b">${bodies[type]||''}</div>
      <div class="modal-f">
        <button onclick="closeModal()" class="btn" style="flex:1;background:white;border:1px solid #e2e8f0;color:#64748b">Mansookh</button>
        <button onclick="${fns[type]||''}" class="btn btn-blue" style="flex:1">${d?'Update':'Save Karen'}</button>
      </div>
    </div>
  </div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────
function render(){document.getElementById('root').innerHTML=S.user?dashHTML():loginHTML();renderModal();}
function navTo(p) {
  S.page = p;
  S.side = false;
  S.q = '';
  render(); // updateContent() ki jagah render() ka istemal karein
}
function toggleSide(){S.side=!S.side;const sb=document.getElementById('sb');if(sb){sb.className='sidebar '+(S.side?'sb-open':'sb-closed');}const ov=document.getElementById('ov');if(ov)ov.style.display=S.side?'block':'none';}
function doLogout(){S.user=null;S.page='overview';render();}

// ── LOGIN ─────────────────────────────────────────────────────────────
function loginHTML(){return `
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(135deg,#1e3a8a,#3730a3)">
  <div style="width:100%;max-width:380px">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:56px;margin-bottom:8px">🎓</div>
      <h1 style="color:white;font-size:22px;font-weight:700">Student Management System</h1>
      <p style="color:#a5b4fc;font-size:13px;margin-top:6px">Teen Dashboard — Admin | Teacher | Mufattish</p>
    </div>
    <div style="background:white;border-radius:20px;padding:28px;box-shadow:0 25px 60px rgba(0,0,0,.3)">
      <h2 style="font-size:16px;font-weight:600;margin-bottom:20px">Login Karen</h2>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div><label class="lbl">Username</label><input id="lun" class="inp" placeholder="username" onkeydown="if(event.key==='Enter')doLogin()"/></div>
        <div><label class="lbl">Password</label>
          <div style="position:relative">
            <input id="lpw" class="inp" type="password" placeholder="password" style="padding-right:38px" onkeydown="if(event.key==='Enter')doLogin()"/>
            <button onclick="var i=document.getElementById('lpw');i.type=i.type==='password'?'text':'password'" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:15px;cursor:pointer;color:#94a3b8">👁️</button>
          </div>
        </div>
        <div id="lerr" style="display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;color:#dc2626;font-size:12px"></div>
        <button onclick="doLogin()" class="btn btn-blue" style="width:100%;justify-content:center;padding:11px">Login Karen</button>
      </div>
      <div style="margin-top:18px;padding-top:14px;border-top:1px solid #f1f5f9;font-size:11px;color:#94a3b8;line-height:2">
        <p>🔑 Admin: <b>admin</b> / <b>admin@123</b></p>
        <p>👨‍🏫 Teacher: Admin se credentials len</p>
        <p>🔍 Mufattish: Admin se credentials len</p>
      </div>
    </div>
  </div>
</div>`;}

function doLogin(){
  const un=document.getElementById('lun').value.trim();
  const pw=document.getElementById('lpw').value;
  const err=document.getElementById('lerr');
  if(!un||!pw){err.textContent='Dono fields zaruri hain';err.style.display='block';return;}
  const f=S.users.find(u=>u.username===un&&u.password===pw);
  if(f){S.user=f;S.page='overview';render();}
  else{err.textContent='Galat username ya password';err.style.display='block';}
}

// ── LAYOUT ────────────────────────────────────────────────────────────
function dashHTML(){
  const role=S.user.role;
  const rc=role==='admin'?'#3b82f6':role==='teacher'?'#10b981':'#8b5cf6';
  const rl=role==='admin'?'Administrator':role==='teacher'?'Teacher':'Mufattish';
  const navA=[{p:'overview',i:'📊',l:'Dashboard'},{p:'classes',i:'🏫',l:'Prep Classes'},{p:'teachers',i:'👨‍🏫',l:'Teachers'},{p:'mufattish',i:'🔍',l:'Mufattish'},{p:'students',i:'👨‍🎓',l:'Students'},{p:'attendance',i:'📅',l:'Attendance'},{p:'reports',i:'📈',l:'Reports'}];
  const navT=[{p:'overview',i:'📊',l:'Dashboard'},{p:'students',i:'👨‍🎓',l:'Mere Students'},{p:'attendance',i:'📅',l:'Hazri'},{p:'reports',i:'📈',l:'Monthly Reports'}];
  const navM=[{p:'overview',i:'📊',l:'Dashboard'},{p:'classes',i:'🏫',l:'Meri Classes'},{p:'attendance',i:'📅',l:'Attendance'},{p:'reports',i:'📈',l:'Reports'}];
  const nav=role==='admin'?navA:role==='teacher'?navT:navM;
  const navHTML=nav.map(({p,i,l})=>`<button class="nav-btn${S.page===p?' act':''}" onclick="navTo('${p}')" style="padding:10px 12px"><span style="font-size:16px">${i}</span>${l}</button>`).join('');
  const content=role==='admin'?adminContent():role==='teacher'?teacherContent():mufattishContent();
  return `
  <div id="ov" onclick="if(S.side){S.side=false;document.getElementById('sb').className='sidebar sb-closed';this.style.display='none';}" style="display:${S.side?'block':'none'};position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:20"></div>
  <div style="display:flex;height:100vh;overflow:hidden">
    <aside id="sb" class="sidebar ${S.side?'sb-open':'sb-closed'}">
      <div style="padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;flex-shrink:0">
        <span style="font-size:22px;flex-shrink:0">🎓</span>
        <div><p style="margin:0;font-size:13px;font-weight:700;white-space:nowrap">Student Mgmt</p><p style="margin:0;font-size:10px;color:#64748b">System v3</p></div>
      </div>
      <div style="padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;flex-shrink:0">
        <div class="av" style="background:${rc}33;color:${rc}">${esc(S.user.name[0].toUpperCase())}</div>
        <div style="min-width:0"><p style="margin:0;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(S.user.name)}</p><p style="margin:0;font-size:10px;color:#64748b">${rl}</p></div>
      </div>
      <nav style="flex:1;padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px">${navHTML}</nav>
      <div style="padding:10px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0">
        <button onclick="doLogout()" class="nav-btn">🚪 Logout</button>
      </div>
    </aside>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0">
      <header style="background:white;border-bottom:1px solid #e2e8f0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
        <div class="frow">
          <button onclick="toggleSide()" style="padding:6px;border-radius:8px;border:none;background:#f1f5f9;font-size:18px;cursor:pointer">☰</button>
          <p style="font-size:12px;color:#94a3b8">${new Date().toLocaleDateString('en-PK',{weekday:'long',day:'numeric',month:'long'})}</p>
        </div>
        <div class="frow">
          <span style="font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:${rc}22;color:${rc}">${rl}</span>
          <div class="av" style="width:32px;height:32px;background:${rc}22;color:${rc}">${esc(S.user.name[0].toUpperCase())}</div>
        </div>
      </header>
      <div id="content" style="flex:1;overflow-y:auto;padding:16px">${content}</div>
    </div>
  </div>`;}

function updateContent(){const el=document.getElementById('content');if(!el)return render();const r=S.user.role;el.innerHTML=r==='admin'?adminContent():r==='teacher'?teacherContent():mufattishContent();}

// ── ADMIN PAGES ───────────────────────────────────────────────────────
function adminContent(){switch(S.page){case'classes':return adminClasses();case'teachers':return adminTeachers();case'mufattish':return adminMufattish();case'students':return adminStudents();case'attendance':return adminAttendance();case'reports':return adminReports();default:return adminOverview();}}

function adminOverview(){
  const teachers=S.users.filter(u=>u.role==='teacher');
  const mufs=S.users.filter(u=>u.role==='mufattish');
  const td=tod(),tda=S.att.filter(a=>a.date===td);
  const prs=tda.filter(a=>a.status==='present').length;
  const abs=tda.filter(a=>a.status==='absent').length;
  const p=pct(prs,S.students.length);
  const unass=S.classes.filter(c=>!c.teacherId||!c.mufattishId);
  const recent=[...S.att].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
  const circ=2*Math.PI*15.9;
  const da=circ*(p/100)+' '+circ*(1-p/100);
  return `<div class="gap16">
  <div><h1 class="thead">Admin Dashboard</h1><p class="tsub">System ka mukammal jaiza</p></div>
  <div class="gauto">
    ${[['🏫',S.classes.length,'Prep Classes','#1d4ed8'],['👨‍🏫',teachers.length,'Teachers','#15803d'],['🔍',mufs.length,'Mufattish','#7c3aed'],['👨‍🎓',S.students.length,'Students','#c2410c']].map(([e,v,l,c])=>`
    <div class="scard"><div style="font-size:24px;margin-bottom:8px">${e}</div><p style="font-size:24px;font-weight:700;color:${c}">${v}</p><p style="font-size:11px;color:#94a3b8;margin-top:2px">${l}</p></div>`).join('')}
  </div>
  <div class="g2">
    <div class="card" style="padding:18px">
      <h3 style="font-size:13px;font-weight:600;margin-bottom:14px">Aaj ki Hazri</h3>
      <div class="frow">
        <div style="position:relative;width:70px;height:70px;flex-shrink:0">
          <svg viewBox="0 0 36 36" style="width:70px;height:70px;transform:rotate(-90deg)">
            <circle cx="18" cy="18" r="15.9" fill="none" stroke="#f1f5f9" stroke-width="3.8"/>
            <circle cx="18" cy="18" r="15.9" fill="none" stroke="#10b981" stroke-width="3.8" stroke-dasharray="${da}" stroke-linecap="round"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700">${p}%</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;font-size:12px;color:#64748b">
          <p>Hazir: <b style="color:#10b981">${prs}</b></p>
          <p>Ghair Hazir: <b style="color:#ef4444">${abs}</b></p>
          <p>Kul Students: <b>${S.students.length}</b></p>
        </div>
      </div>
    </div>
    <div class="card" style="padding:18px">
      <h3 style="font-size:13px;font-weight:600;margin-bottom:12px">⚠ Tawajjah Chahiye</h3>
      ${unass.length===0?'<p style="font-size:12px;color:#10b981">✅ Tamam classes mukammal assigned hain</p>':unass.slice(0,4).map(c=>`
      <div class="warnbox">
        <span style="font-size:12px;font-weight:500;color:#92400e">${esc(c.name)} ${esc(c.section)}</span>
        <div class="frow">
          ${!c.teacherId?'<span class="badge" style="background:#fef3c7;color:#92400e;font-size:10px">No Teacher</span>':''}
          ${!c.mufattishId?'<span class="badge" style="background:#fed7aa;color:#9a3412;font-size:10px">No Mufattish</span>':''}
        </div>
      </div>`).join('')}
    </div>
  </div>
  ${recent.length?`<div class="card">
    <div style="padding:12px 18px;border-bottom:1px solid #f8fafc"><h3 style="font-size:13px;font-weight:600">Haliya Hazri</h3></div>
    <div class="ovx"><table style="min-width:380px"><thead><tr><th>Student</th><th>Tarikh</th><th>Status</th></tr></thead>
    <tbody>${recent.map(r=>{const s=S.students.find(x=>x.id===r.studentId);return`<tr><td><b>${esc(s?.name||'—')}</b></td><td>${fD(r.date)}</td><td>${badgeH(r.status)}</td></tr>`;}).join('')}</tbody></table></div>
  </div>`:''}
  </div>`;}

function adminClasses(){
  const teachers=S.users.filter(u=>u.role==='teacher');
  const mufs=S.users.filter(u=>u.role==='mufattish');
  const q=S.q.toLowerCase();
  const list=S.classes.filter(c=>!q||`${c.name}${c.section}`.toLowerCase().includes(q));
  return `<div class="gap16">
  <div class="fbetween">
    <div><h1 class="thead">Prep Classes</h1><p class="tsub">Tamam classes manage karen</p></div>
    <button class="btn btn-blue" onclick="openModal('class',null)">➕ Nayi Class</button>
  </div>
  <div style="position:relative"><span style="position:absolute;left:10px;top:50%;transform:translateY(-50%)">🔎</span>
  <input class="inp" placeholder="Class talash karen..." value="${esc(S.q)}" oninput="S.q=this.value;updateContent()" style="padding-left:32px"/></div>
  ${list.length===0?noD('🏫','Abhi koi class nahi'):`
  <div class="g3">${list.map(c=>{

    <tbody>${ms.map((s,i)=>{
      const r=S.reports.find(x=>x.studentId===s.id&&x.classId===mc.id&&x.month===S.rptMonth&&x.year===S.rptYear);
      const marks=r?.marks??'';const total=r?.totalMarks||100;
      const g=marks!==''?grd(parseInt(marks)||0,total):null;
      return `<tr id="rtr${s.id}">
        <td style="color:#94a3b8">${i+1}</td>
        <td><b>${esc(s.name)}</b></td>
        <td><input type="number" min="0" id="m${s.id}" value="${marks}" oninput="ugrd('${s.id}')" style="width:70px;padding:5px 8px;border:1px solid #e2e8f0;border-radius:7px;font-size:12px;text-align:center;font-family:inherit"/></td>
        <td><input type="number" id="t${s.id}" value="${total}" oninput="ugrd('${s.id}')" style="width:60px;padding:5px 8px;border:1px solid #e2e8f0;border-radius:7px;font-size:12px;text-align:center;font-family:inherit"/></td>
        <td id="g${s.id}">${g?`<span class="badge" style="background:${gBg(g)};color:${gCl(g)}">${g}</span>`:'<span style="color:#cbd5e1">—</span>'}</td>

      </tr>`;}).join('')}

function ugrd(sid){
  const m=parseInt(document.getElementById('m'+sid)?.value)||0;
  const t=parseInt(document.getElementById('t'+sid)?.value)||100;
  const el=document.getElementById('g'+sid);if(!el)return;
  const mv=document.getElementById('m'+sid)?.value;
  el.innerHTML=mv===''?'<span style="color:#cbd5e1">—</span>':`<span class="badge" style="background:${gBg(grd(m,t))};color:${gCl(grd(m,t))}">${grd(m,t)}</span>`;
}

function saveRpts(){
  const mc=myClass();if(!mc)return;
  const ms=myStu();
  const base=S.reports.filter(r=>!(r.classId===mc.id&&r.month===S.rptMonth&&r.year===S.rptYear));
  const add=[];
  ms.forEach(s=>{
    const mv=document.getElementById('m'+s.id)?.value;
    if(mv===''||mv===undefined)return;
    const m=parseInt(mv)||0;
    const t=parseInt(document.getElementById('t'+s.id)?.value)||100;
    const rmk=document.getElementById('rmk'+s.id)?.value||'';
    const ex=S.reports.find(r=>r.studentId===s.id&&r.classId===mc.id&&r.month===S.rptMonth&&r.year===S.rptYear);
    add.push({id:ex?.id||uid(),studentId:s.id,classId:mc.id,month:S.rptMonth,year:S.rptYear,marks:m,totalMarks:t,grade:grd(m,t),remarks:rmk,submittedBy:S.user.id,createdAt:new Date().toISOString()});
  });
  S.reports=[...base,...add];sv.r();toast('Reports save ho gayi ✓');
}

    <tbody>${allR.map(r=>{const s=S.students.find(x=>x.id===r.studentId);const cls=mc.find(x=>x.id===r.classId);return`
    <tr><td><b>${esc(s?.name||'—')}</b></td><td>${cls?`${esc(cls.name)} ${esc(cls.section)}`:'—'}</td>

function saveClass(){

function saveUser(){
  const d=S.modal.data;const role=S.modal.type;
  const name=document.getElementById('mn').value.trim();
  const username=document.getElementById('mu').value.trim();
  const password=document.getElementById('mp').value;
  const phone=document.getElementById('mph').value;
  let ok=true;
  const se=(id,msg)=>{const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block';}ok=false;};
  const he=id=>{const el=document.getElementById(id);if(el)el.style.display='none';};
  he('mne');he('mue');he('mpe');
  if(!name)se('mne','Naam zaruri hai');
  if(!username)se('mue','Username zaruri hai');
  else if(S.users.find(u=>u.username===username&&u.id!==d?.id))se('mue','Ye username pehle se maujood hai');
  if(!password)se('mpe','Password zaruri hai');
  else if(password.length<4)se('mpe','Kam az kam 4 harf');
  if(!ok)return;
  const obj={id:d?.id||uid(),name,username,password,phone,role,createdAt:d?.createdAt||new Date().toISOString()};
  S.users=d?S.users.map(u=>u.id===d.id?obj:u):[...S.users,obj];
  sv.u();closeModal();toast(d?'Update ho gaya ✓':'Naya account ban gaya ✓');updateContent();
}
function saveStudent(){
  const d=S.modal.data;const mc=myClass();if(!mc)return;
  const name=document.getElementById('mn').value.trim();
  if(!name){const el=document.getElementById('mse');el.textContent='Naam zaruri hai';el.style.display='block';return;}
  const obj={id:d?.id||uid(),classId:mc.id,name,fatherName:document.getElementById('mf').value,rollNo:document.getElementById('mrl').value,studentId:document.getElementById('msi').value,phone:document.getElementById('mph').value,dob:document.getElementById('mdb').value,createdAt:d?.createdAt||new Date().toISOString()};
  S.students=d?S.students.map(s=>s.id===d.id?obj:s):[...S.students,obj];
  sv.s();closeModal();toast(d?'Update ho gaya ✓':'Naya Student add ho gaya ✓');updateContent();
}
function deleteClass(id){if(!confirm('Class delete karni hai?'))return;S.classes=S.classes.filter(c=>c.id!==id);S.students=S.students.filter(s=>s.classId!==id);S.att=S.att.filter(a=>a.classId!==id);S.reports=S.reports.filter(r=>r.classId!==id);sv.c();sv.s();sv.a();sv.r();toast('Class delete ho gayi');updateContent();}
function deleteUser(id){if(!confirm('Delete karna hai?'))return;S.users=S.users.filter(u=>u.id!==id);sv.u();toast('Delete ho gaya');updateContent();}
function deleteStudent(id){if(!confirm('Student delete karna hai?'))return;S.students=S.students.filter(s=>s.id!==id);S.att=S.att.filter(a=>a.studentId!==id);sv.s();sv.a();toast('Student delete ho gaya');updateContent();}

// ── ATTENDANCE ────────────────────────────────────────────────────────
function markAtt(sid,status){
  const mc=myClass();if(!mc)return;
  const ex=S.att.find(a=>a.studentId===sid&&a.classId===mc.id&&a.date===S.attDate);
  if(ex)S.att=S.att.map(a=>a.id===ex.id?{...a,status}:a);
  else S.att=[...S.att,{id:uid(),studentId:sid,classId:mc.id,date:S.attDate,status,markedBy:S.user.id,at:new Date().toISOString()}];
  sv.a();updateContent();
}
function markAllAtt(status){
  const mc=myClass();if(!mc)return;
  const ms=myStu();
  S.att=[...S.att.filter(a=>!(a.classId===mc.id&&a.date===S.attDate)),...ms.map(s=>({id:uid(),studentId:s.id,classId:mc.id,date:S.attDate,status,markedBy:S.user.id,at:new Date().toISOString()}))];
  sv.a();toast(`Tamam ${status==='present'?'Hazir':'Ghair Hazir'} ✓`);updateContent();
}

// ── UI HELPERS ────────────────────────────────────────────────────────
function badgeH(s){const m={present:{bg:'#dcfce7',c:'#16a34a',l:'Hazir'},absent:{bg:'#fee2e2',c:'#dc2626',l:'Ghair Hazir'},late:{bg:'#fef3c7',c:'#d97706',l:'Der'}};const x=m[s]||{bg:'#f1f5f9',c:'#64748b',l:s};return`<span class="badge" style="background:${x.bg};color:${x.c}">${x.l}</span>`;}
function noD(icon,msg){return`<div class="nodata"><div style="font-size:40px;margin-bottom:10px">${icon}</div><p>${msg}</p></div>`;}
function noClass(msg='Koi class assign nahi',sub='Admin se class assignment karwaen'){return`<div style="display:flex;align-items:center;justify-content:center;height:60vh"><div style="text-align:center;max-width:300px"><div style="font-size:52px;margin-bottom:14px">📋</div><h2 style="font-size:18px;font-weight:600;color:#334155;margin-bottom:8px">${msg}</h2><p style="font-size:13px;color:#94a3b8">${sub}</p></div></div>`;}

// ── INIT ──────────────────────────────────────────────────────────────
function init(){
  let u=db.get(K.U);
  if(!u?.length){u=[ADMIN];db.set(K.U,u);}
  S.users=u;S.classes=db.get(K.C)||[];S.students=db.get(K.S)||[];S.att=db.get(K.A)||[];S.reports=db.get(K.R)||[];
  render();
}
init();
</script>
